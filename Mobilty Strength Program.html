      const saved = localStorage.getItem('10WeekTrackerData');
      if (saved) completedSets = JSON.parse(saved);
    } catch (e) {
      console.log("Local storage not available");
    }

    let timeLeft = 0;
    let timerActive = false;
    let timerInterval = null;

    function init() {
      const phaseSelector = document.getElementById('phase-selector');
      phases.forEach(p => {
        const option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.name;
        phaseSelector.appendChild(option);
      });

      phaseSelector.addEventListener('change', (e) => {
        activePhaseId = e.target.value;
        document.getElementById('phase-description').textContent = phases.find(p => p.id === activePhaseId).desc;
        renderApp();
      });
      document.getElementById('phase-description').textContent = phases[0].desc;

      renderCategories();
      renderApp();
    }

    function renderCategories() {
      const catContainer = document.getElementById('category-tabs');
      catContainer.innerHTML = '';
      categoriesList.forEach(cat => {
        const btn = document.createElement('button');
        btn.onclick = () => {
          activeCategory = cat;
          const dataNode = activeCategory === "Main Plan" ? workoutData["Main Plan"][activePhaseId] : workoutData[activeCategory];
          activeSubDay = Object.keys(dataNode)[0];
          renderCategories();
          renderApp();
        };
        btn.className = `px-5 py-3 rounded-xl font-bold whitespace-nowrap transition-all ${
          activeCategory === cat 
            ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' 
            : 'bg-neutral-800 text-neutral-400 hover:bg-neutral-700'
        }`;
        btn.textContent = cat;
        catContainer.appendChild(btn);
      });
    }

    function renderApp() {
      const dataNode = activeCategory === "Main Plan" ? workoutData["Main Plan"][activePhaseId] : workoutData[activeCategory];
      const days = Object.keys(dataNode);
      
      if (!days.includes(activeSubDay)) activeSubDay = days[0];

      // Render Day Tabs
      const dayContainer = document.getElementById('day-tabs');
      dayContainer.innerHTML = '';
      days.forEach(day => {
        const btn = document.createElement('button');
        btn.onclick = () => {
          activeSubDay = day;
          renderApp();
        };
        btn.className = `px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all ${
          activeSubDay === day 
            ? 'bg-neutral-100 text-neutral-900' 
            : 'border border-neutral-700 text-neutral-400 hover:bg-neutral-800'
        }`;
        btn.textContent = day;
        dayContainer.appendChild(btn);
      });

      document.getElementById('current-day-title').textContent = activeSubDay;

      // Render Exercises
      const exercises = dataNode[activeSubDay] || [];
      const exContainer = document.getElementById('exercise-list');
      exContainer.innerHTML = '';

      exercises.forEach((ex, exIdx) => {
        const div = document.createElement('div');
        div.className = "bg-neutral-800 border border-neutral-700 rounded-2xl p-4 shadow-md hover:border-neutral-600 transition-colors";
        
        let checksHtml = '';
        for (let i = 0; i < ex.sets; i++) {
          const key = getTrackKey(ex.name, i);
          const isChecked = completedSets[key];
          
          checksHtml += `
            <button onclick="handleCheck('${ex.name}', ${i})" class="w-12 h-12 md:w-10 md:h-10 rounded-xl flex items-center justify-center transition-all transform active:scale-90 ${
              isChecked 
                ? 'bg-green-500/20 text-green-500 border-2 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.3)]' 
                : 'bg-neutral-900 border border-neutral-600 text-neutral-600 hover:border-neutral-400'
            }">
              ${isChecked 
                ? `<svg class="w-6 h-6 md:w-5 md:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><polyline points="9 11 12 14 22 4"/></svg>` 
                : `<svg class="w-6 h-6 md:w-5 md:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>`}
            </button>
          `;
        }

        const advancedHtml = ex.advanced 
          ? `<div class="mt-3 bg-blue-900/10 border border-blue-900/30 rounded-lg p-3">
               <span class="text-[10px] text-blue-400 font-bold uppercase tracking-wider block mb-1">Advanced Standard Goal</span>
               <p class="text-sm text-neutral-300">${ex.advanced}</p>
             </div>`
          : '';

        // Generate dynamic placeholder and search URL
        const encodedName = encodeURIComponent(ex.name.split(' ').slice(0, 3).join('\n'));
        const placeholderUrl = `https://placehold.co/150x150/172554/60a5fa?text=${encodedName}`;
        const searchUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(ex.name + ' exercise proper form')}`;

        div.innerHTML = `
          <div class="flex flex-col md:flex-row justify-between gap-4">
            
            <!-- Dynamic Image & Form Reference -->
            <div class="shrink-0 flex flex-col gap-2 w-full md:w-32">
              <div class="w-full h-32 bg-neutral-900 rounded-xl overflow-hidden border border-neutral-700 flex items-center justify-center relative group shadow-inner">
                 <img src="${placeholderUrl}" alt="${ex.name}" onerror="this.src='https://placehold.co/150x150/172554/60a5fa?text=Image'" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
              </div>
              <a href="${searchUrl}" target="_blank" class="text-[11px] font-semibold text-center text-blue-400 hover:text-blue-300 hover:underline flex items-center justify-center gap-1 bg-blue-950/30 py-1.5 rounded-lg border border-blue-900/50 transition-colors">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                View Form
              </a>
            </div>

            <!-- Exercise Details -->
            <div class="flex-1">
              <h3 class="text-lg font-bold text-white mb-1">${ex.name}</h3>
              <div class="flex items-center gap-3 mb-3">
                <span class="inline-block px-2 py-1 bg-neutral-900 text-neutral-300 text-xs font-bold rounded">${ex.sets} Sets</span>
                <span class="inline-block px-2 py-1 bg-neutral-900 text-blue-300 text-xs font-bold rounded">${ex.reps}</span>
              </div>
              <p class="text-sm text-neutral-400 leading-relaxed border-l-2 border-neutral-600 pl-3 mb-2"><strong class="text-neutral-300 font-semibold">Key Note:</strong> ${ex.notes}</p>
              ${advancedHtml}
            </div>

            <!-- Checkboxes -->
            <div class="flex flex-row md:flex-col gap-2 items-center justify-center md:justify-start md:w-auto w-full border-t md:border-t-0 md:border-l border-neutral-700 pt-4 md:pt-0 md:pl-4">
              <span class="text-xs text-neutral-500 font-bold uppercase tracking-wider mb-1 hidden md:block">Track</span>
              <div class="flex gap-3">${checksHtml}</div>
            </div>
          </div>
        `;
        exContainer.appendChild(div);
      });

      updateProgress();
    }

    function getTrackKey(exerciseName, setIndex) {
      const phasePrefix = activeCategory === "Main Plan" ? activePhaseId : "static";
      return `${activeCategory}-${phasePrefix}-${activeSubDay}-${exerciseName}-${setIndex}`;
    }

    function handleCheck(exerciseName, setIndex) {
      const key = getTrackKey(exerciseName, setIndex);
      if (completedSets[key]) {
        delete completedSets[key];
      } else {
        completedSets[key] = true;
      }
      
      try {
        localStorage.setItem('10WeekTrackerData', JSON.stringify(completedSets));
      } catch(e){}
      
      renderApp();
    }

    function updateProgress() {
      const dataNode = activeCategory === "Main Plan" ? workoutData["Main Plan"][activePhaseId] : workoutData[activeCategory];
      const exercises = dataNode[activeSubDay] || [];
      
      let totalSets = 0;
      let completedSetsCount = 0;

      exercises.forEach(ex => {
        totalSets += ex.sets;
        for (let i = 0; i < ex.sets; i++) {
          if (completedSets[getTrackKey(ex.name, i)]) completedSetsCount++;
        }
      });

      const progressPercent = totalSets === 0 ? 0 : Math.round((completedSetsCount / totalSets) * 100);
      
      document.getElementById('progress-text').textContent = `${completedSetsCount} of ${totalSets} sets completed`;
      
      const bar = document.getElementById('progress-bar');
      bar.style.width = `${progressPercent}%`;
      
      if (progressPercent === 100 && totalSets > 0) {
        bar.classList.replace('bg-blue-500', 'bg-green-500');
        document.getElementById('done-badge').classList.remove('hidden');
        document.getElementById('done-badge').classList.add('flex');
      } else {
        bar.classList.replace('bg-green-500', 'bg-blue-500');
        document.getElementById('done-badge').classList.add('hidden');
        document.getElementById('done-badge').classList.remove('flex');
      }

      const resetBtn = document.getElementById('reset-day-container');
      if (completedSetsCount > 0) {
        resetBtn.classList.remove('hidden');
      } else {
        resetBtn.classList.add('hidden');
      }
    }

    function resetCurrentDay() {
      if(confirm("Reset checkboxes for this day?")) {
        const dataNode = activeCategory === "Main Plan" ? workoutData["Main Plan"][activePhaseId] : workoutData[activeCategory];
        const exercises = dataNode[activeSubDay] || [];
        
        exercises.forEach(ex => {
          for (let i = 0; i < ex.sets; i++) {
            delete completedSets[getTrackKey(ex.name, i)];
          }
        });
        
        try {
          localStorage.setItem('10WeekTrackerData', JSON.stringify(completedSets));
        } catch(e){}
        
        renderApp();
      }
    }

    // Timer Functions
    function playBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 1.5);
      } catch (e) { }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateTimerUI() {
      document.getElementById('timer-display').textContent = formatTime(timeLeft);
      const icon = document.getElementById('timer-icon');
      
      if (timeLeft > 0) {
        icon.classList.add('text-amber-400', 'animate-pulse');
        icon.classList.remove('text-neutral-400');
      } else {
        icon.classList.remove('text-amber-400', 'animate-pulse');
        icon.classList.add('text-neutral-400');
      }

      const btn = document.getElementById('toggle-timer-btn');
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');

      if (timerActive) {
        btn.classList.replace('bg-green-500/20', 'bg-amber-500/20');
        btn.classList.replace('text-green-400', 'text-amber-400');
        btn.classList.replace('hover:bg-green-500/30', 'hover:bg-amber-500/30');
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      } else {
        btn.classList.replace('bg-amber-500/20', 'bg-green-500/20');
        btn.classList.replace('text-amber-400', 'text-green-400');
        btn.classList.replace('hover:bg-amber-500/30', 'hover:bg-green-500/30');
        pauseIcon.classList.add('hidden');
        playIcon.classList.remove('hidden');
      }
    }

    function timerTick() {
      if (timeLeft > 0) {
        timeLeft--;
        updateTimerUI();
      } else if (timeLeft === 0 && timerActive) {
        timerActive = false;
        clearInterval(timerInterval);
        playBeep();
        updateTimerUI();
      }
    }

    function startTimer(seconds) {
      timerActive = false;
      clearInterval(timerInterval);
      timeLeft = seconds;
      timerActive = true;
      updateTimerUI();
      timerInterval = setInterval(timerTick, 1000);
    }

    function toggleTimer() {
      if (timerActive) {
        timerActive = false;
        clearInterval(timerInterval);
      } else {
        if (timeLeft > 0) {
          timerActive = true;
          timerInterval = setInterval(timerTick, 1000);
        }
      }
      updateTimerUI();
    }

    function resetTimer() {
      timerActive = false;
      clearInterval(timerInterval);
      timeLeft = 0;
      updateTimerUI();
    }

    // Initialize the app on load
    window.onload = init;
  </script>
</body>
</html>
